<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro.css') }}">
    <title>Registro</title>
</head>
<body>
    
    <div class="registro">
        <div class="titulo">
            <h1>Registro de usuario</h1>
            <p> El registro es opcional. Solamente sirve para practicar, los datos son con fines academicos</p>
        </div>

        <div class="formulario">
            <form method="POST" action="/registro"> 
                <label>Usuario:</label><br>
                <input type="text" name="Username" required><br><br>
                
                <label>Contraseña:</label><br>
                <input type="password" name="Password" required><br><br>

                <button type="submit">Crear cuenta</button>
            </form>
        </div>
        <div class="enlace">
            <br>
            <a href="/login">¿Ya tienes una cuenta? Inicia sesión aquí.</a>
        </div>
    </div>
</body>
</html>

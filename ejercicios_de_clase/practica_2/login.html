<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión</title>
</head>
<body>
    <header>
        <h1> Formulario de inicio de sesión</h1>
        <p></p>
        <hr>
    </header>
    <main>
        <form action="index_practica_2.html">
            <label for="txtInput">Ingrese su nombre de usuario: </label>
            <input type="text" name="txtInput" id="txtInput" placeholder="Ej: Federico" required>
            <hr>
            <label for="passworldInput">Ingrese una contraseña: </label>
            <input type="password" name="passworldInput" id="passworldInput" placeholder="Ej: 123456" minlength="5" required>
            <hr>
            <label for="checkinput">Recordar datos de usuario</label>
            <input type="checkbox" name="checkinput" id="checkinput">
            <hr>
            <button type="submit">Iniciar sesión</button>
        </form>
    </main>
</body>
</html>

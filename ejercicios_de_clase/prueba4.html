<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <header>

    </header>

    <nav>

    </nav>

    <main>
        <form action="#" method="" target="_blank">

            <label for="txtInput">Titulo del campo: </label>
            <input type="text" id="txtInput" name="txtInput" value="" placeholder="hola mundo" required disabled
                readonly size="" maxlength="5" autocomplete="">
            <hr>

            <label for="passInput">Contraseña</label>
            <input type="password" id="passInput" name="passInput" min="15" max="20" placeholder="josesito">
            <hr>
            <label for="numInput">Numero</label>
            <input type="number" id="numInput" name="numInput">
            <hr>
            <label for="radInput">Elije una opcion</label>
            <input type="radio" id="radInput" name="radInput">
            <input type="radio" id="radiInput" name="radInput">
            <hr>
            <input type="button" name="" id="" value="enviar">
            <button>enviar</button>
            <hr>
            <select name="" id="">
                <option value="1" selected disabled>Seleccione una opcion</option>
                <option value="2">Pizza</option>
                <option value="3">Samguche</option>
            </select>

            <hr>

            <fieldset>
                <label for="colorInput">Seleccione un color: </label>
                <input type="color" name="colorInput" id="colorInput">
            </fieldset>

            <hr>

            <label for="checInput">Seleccione una opcion</label>
            <input type="checkbox" name="checInput" id="checInput">
            <input type="checkbox" name="checInput" id="checInput">

            <hr>
            <textarea name="" id="" rows="10" cols="20">Ingrese su comentario</textarea>
            <hr>
            
            <label for="dateInput">Ingrese su fecha de nacimiento</label>
            <input type="date" name="dateInput" id="dateInput">
            
            <hr>
            <label for="browser">Choose a browser:</label>
            <input list="browsers" id="browser" name="browser">

            <datalist id="browsers">
                <option value="Chrome">
                <option value="Firefox">
                <option value="Safari">
                <option value="Edge">
            </datalist>


        </form>
    </main>

    <footer>
        <hr>
    </footer>

</body>

</html>
